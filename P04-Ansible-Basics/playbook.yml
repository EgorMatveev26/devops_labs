---
- name: Deploy Nginx
  hosts: webservers
  become: yes
  become_method: sudo

  tasks:
    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: latest
        update_cache: yes

    - name: Copy index
      ansible.builtin.copy:
        src: /home/egor26/ansible-nginx/index.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0666'
